# MathHook Security Scanning
# Runs on schedule and on push to main
# Uses pre-built Docker container for consistent scanning

name: Security

on:
  schedule:
    - cron: '0 6 1 * *'  # Weekly on Monday at 6 AM UTC
  push:
    branches: [main, master]
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/package.json'
      - '**/package-lock.json'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Rust dependency audit (cargo-audit is pre-installed in container)
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/ahmedmashour/mathhook-builder:latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run audit
        run: cargo audit --deny warnings

  # Rust dependency license check
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe  # v2.0.20
        with:
          command: check
          arguments: --all-features

  # Container image scanning
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          image-ref: 'ghcr.io/ahmedmashour/mathhook-builder:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@c37a8b7cd97e31de3fcbd9d84c401870edeb8d34  # v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Filesystem vulnerability scan
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # 0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@c37a8b7cd97e31de3fcbd9d84c401870edeb8d34  # v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

  # npm audit
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/ahmedmashour/mathhook-builder:latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run npm audit
        run: |
          cd crates/mathhook-node
          npm install
          npm audit --audit-level=high

  # Summary job
  security-summary:
    name: Security Summary
    needs: [cargo-audit, cargo-deny, trivy-fs, npm-audit]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Generate summary
        run: ./scripts/ci/security-summary.sh "${{ needs.cargo-audit.result }}" "${{ needs.cargo-deny.result }}" "${{ needs.trivy-fs.result }}" "${{ needs.npm-audit.result }}"
